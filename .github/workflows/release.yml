name: Release

# Se dispara al hacer push de un tag de versión (p. ej. v0.1.0),
# al publicar una Release desde la web de GitHub, o manualmente.
on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a construir (sin la v), p. ej. 0.1.0'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  android:
    name: APK (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolver versión
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Empaquetar APK
        shell: bash
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "dist/CompartirArchivosRED-${{ steps.ver.outputs.version }}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: dist/*.apk

  windows:
    name: MSI (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolver versión
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Instalar WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Añadir extensiones WiX
        shell: pwsh
        run: |
          wix extension add -g WixToolset.UI.wixext/5.0.2
          wix extension add -g WixToolset.Firewall.wixext/5.0.2

      - name: Publicar app + construir MSI
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $ws = $env:GITHUB_WORKSPACE
          $pub = Join-Path $ws "windows\publish"
          $out = Join-Path $ws "dist\CompartirArchivosRED-$v.msi"
          dotnet publish (Join-Path $ws "windows\src\App\CompartirArchivosRED.App.csproj") -c Release -r win-x64 --self-contained true -p:Version=$v -o $pub
          New-Item -ItemType Directory -Force (Join-Path $ws "dist") | Out-Null
          Push-Location (Join-Path $ws "windows\installer")
          wix build Package.wxs -arch x64 -d Version=$v -d PublishDir=$pub -ext WixToolset.UI.wixext -ext WixToolset.Firewall.wixext -o $out
          Pop-Location

      - uses: actions/upload-artifact@v4
        with:
          name: msi
          path: dist/*.msi

  release:
    name: Publicar Release
    needs: [android, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Descargar artefactos
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Reunir binarios
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.apk' -o -name '*.msi' \) -exec cp {} dist/ \;
          ls -la dist

      - name: Crear/actualizar Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Compartir Archivos RED ${{ github.ref_name }}"
          files: dist/*
          generate_release_notes: true
          body: |
            ## Compartir Archivos RED ${{ github.ref_name }}

            Binarios listos para instalar:

            | Plataforma | Archivo |
            | ---------- | ------- |
            | 📱 Android | `CompartirArchivosRED-*.apk` (firmado con clave de depuración, instalable) |
            | 🖥️ Windows | `CompartirArchivosRED-*.msi` (self-contained, no requiere .NET) |

            Consulta el [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) para el detalle de cambios.
